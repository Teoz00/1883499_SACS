# IoT Greenhouse Platform – full stack with docker compose.
# Before first run, load the professor's IoT simulator image (file in infrastructure/simulator/):
#   docker load -i infrastructure/simulator/mars-iot-simulator-oci.tar
# Then: docker compose up

# Zookeeper and Kafka: Confluent Platform (Bitnami images were removed from Docker Hub)
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rules-db
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  iot-simulator:
    image: mars-iot-simulator:multiarch_v1
    # External simulator; load first: docker load -i infrastructure/simulator/mars-iot-simulator-oci.tar
    # Other services reach it via hostname "iot-simulator" on the Docker network.
    ports:
      - "8080:8080"

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      - SENSORS_SERVICE_URL=http://iot-simulator:8080
      - ACTUATORS_SERVICE_URL=http://actuator-management-service:8005
      - RULES_SERVICE_URL=http://rule-management-service:8004
    ports:
      - "8000:8000"
    depends_on:
      - rule-management-service
      - actuator-management-service
      - iot-simulator

  ingestion-service:
    build:
      context: ./services/ingestion-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SIMULATOR_BASE_URL=http://iot-simulator:8080
    ports:
      - "8001:8001"
    depends_on:
      - kafka
      - iot-simulator

  processing-service:
    build:
      context: ./services/processing-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8002:8002"
    depends_on:
      - kafka

  actuator-rules-service:
    build:
      context: ./services/actuator-rules-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rules-db
    ports:
      - "8003:8003"
    depends_on:
      - kafka
      - postgres

  rule-management-service:
    build:
      context: ./services/rule-management-service
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rules-db
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  actuator-management-service:
    build:
      context: ./services/actuator-management-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SIMULATOR_BASE_URL=http://iot-simulator:8080
    ports:
      - "8005:8005"
    depends_on:
      - kafka
      - iot-simulator

  realtime-service:
    build:
      context: ./services/realtime-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8006:8006"
    depends_on:
      - kafka

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8006/ws/events
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
      - realtime-service

